name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches app version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          TAURI_VER=$(jq -r '.version' src-tauri/tauri.conf.json)
          CARGO_VER=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Tag: $TAG | tauri.conf.json: $TAURI_VER | Cargo.toml: $CARGO_VER"
          if [ "$TAG" != "$TAURI_VER" ]; then
            echo "::error::Tag v$TAG does not match tauri.conf.json version $TAURI_VER"
            exit 1
          fi
          if [ "$TAG" != "$CARGO_VER" ]; then
            echo "::error::Tag v$TAG does not match Cargo.toml version $CARGO_VER"
            exit 1
          fi
          echo "✅ Version $TAG matches all config files"

  build:
    needs: version-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: ''
          - os: macos-latest
            target: ''
          - os: windows-latest
            target: ''
          - os: windows-latest
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Add Rust target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libdbus-1-dev pkg-config
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Mogly ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG for details.'
          updaterJsonPreferNsis: true
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

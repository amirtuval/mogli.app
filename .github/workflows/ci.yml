name: CI

on:
  push:
    branches: ['**']

env:
  CARGO_TERM_COLOR: always
  TAURI_APT_DEPS: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libdbus-1-dev pkg-config

jobs:
  lint-and-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.TAURI_APT_DEPS }}
          version: 1.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: cargo fmt --check --manifest-path src-tauri/Cargo.toml
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -W clippy::pedantic -D warnings
      - run: yarn format:check
      - run: yarn lint

  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.TAURI_APT_DEPS }}
          version: 1.0
      - run: cargo test --manifest-path src-tauri/Cargo.toml --all

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn test

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: npx tsc --noEmit
